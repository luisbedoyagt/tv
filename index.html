<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor HLS - GitHub Pages</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .video-container {
            width: 90%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }

        .info {
            margin-top: 20px;
            text-align: center;
        }

        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #2e7d32;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video" controls autoplay playsinline poster="https://via.placeholder.com/1920x1080/000000/FFFFFF?text=Cargando+Stream..."></video>
    </div>

    <div class="info">
        <span class="status-tag">En Directo</span>
        <h1>Reproductor de Video</h1>
        <p>Transmitiendo vía HLS (.m3u8)</p>
    </div>

    <script>
        const video = document.getElementById('video');
        // Tu enlace con token
        const videoSrc = 'https://agvyby.fubohd.com/americatv/mono.m3u8?token=bf046d800f6e96c1774a73aebc9309fb2b189ee1-a1-1772583762-1772565762';

        if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(() => {
                    console.log("El navegador bloqueó el autoplay. Se requiere interacción del usuario.");
                });
            });

            // Manejo de errores básicos
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.error("Error de red: El token podría haber expirado.");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.error("Error de medios: Intentando recuperar...");
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Soporte nativo para Safari y navegadores de iOS
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
