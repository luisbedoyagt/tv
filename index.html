<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor VIP | ESPN+</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 960px;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            cursor: pointer;
        }
        /* Botón de Sonido Flotante */
        #unmute-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #unmute-btn:hover { background: #cc0000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <button id="unmute-btn">
            <span>🔊 ACTIVAR SONIDO AL 100%</span>
        </button>
        
        <video id="video" controls autoplay muted playsinline></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const btn = document.getElementById('unmute-btn');
        const videoSrc = 'https://ng0pr.envivoslatam.org/espnplus1/tracks-v1a1/mono.m3u8?ip=181.174.104.54&token=6876c12cbff5d672cab2ce55834bd564efc39684-41-1772612345-1772558345';

        // Configuración de HLS
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => {
                video.play();
            });
        }

        // Función para activar sonido al máximo con un clic
        btn.addEventListener('click', () => {
            video.muted = false;   // Quita el silencio
            video.volume = 1.0;    // Volumen al 100% (1.0 es el máximo)
            btn.classList.add('hidden'); // Oculta el botón
        });

        // Por si el usuario usa los controles nativos
        video.onvolumechange = () => {
            if (!video.muted) btn.classList.add('hidden');
        };
    </script>

</body>
</html>
