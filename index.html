<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Autoplay | ESPN+</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .video-container {
            width: 100%;
            max-width: 1000px;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video" controls autoplay muted playsinline></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoSrc = 'https://ng0pr.envivoslatam.org/espnplus1/tracks-v1a1/mono.m3u8?ip=181.174.104.54&token=6876c12cbff5d672cab2ce55834bd564efc39684-41-1772612345-1772558345';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // Forzamos el play una vez detectado el video
                video.play();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
