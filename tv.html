<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor America TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .container {
            width: 80%;
            max-width: 800px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            color: white;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reproductor en Vivo</h2>
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
    var video = document.getElementById('video');
    var videoSrc = 'https://agvyby.fubohd.com/americatv/mono.m3u8?token=bf046d800f6e96c1774a73aebc9309fb2b189ee1-a1-1772583762-1772565762';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    }
    // Soporte nativo para Safari (iOS/Mac)
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }
</script>

</body>
</html>
